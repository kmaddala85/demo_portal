{% extends "base/base.html" %}
{% load static %}
{% block content%}

<div class="row" style="margin-top: 2%; margin-bottom: 20px;">
    <h3>Apache ECharts</h3>
    <p class="text-muted"><small>Visualization powered by Apache ECharts (Apache 2.0 License)</small></p>

    <div class="col-md-6">
        <h4>Basic Line Chart</h4>
        <div id="echart-line" style="width: 100%; height: 400px;"></div>
    </div>

    <div class="col-md-6">
        <h4>Basic Pie Chart</h4>
        <div id="echart-pie" style="width: 100%; height: 400px;"></div>
    </div>
</div>

<script type="text/javascript">
    // Initialize Line Chart
    var lineChart = echarts.init(document.getElementById('echart-line'));
    var lineOption = {
        title: {
            text: 'Weekly Sales'
        },
        tooltip: {
            trigger: 'axis'
        },
        legend: {
            data: ['Email', 'Union Ads', 'Video Ads', 'Direct', 'Search Engine']
        },
        grid: {
            left: '3%',
            right: '4%',
            bottom: '3%',
            containLabel: true
        },
        toolbox: {
            feature: {
                saveAsImage: {}
            }
        },
        xAxis: {
            type: 'category',
            boundaryGap: false,
            data: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun']
        },
        yAxis: {
            type: 'value'
        },
        series: [
            {
                name: 'Email',
                type: 'line',
                stack: 'Total',
                data: [120, 132, 101, 134, 90, 230, 210]
            },
            {
                name: 'Union Ads',
                type: 'line',
                stack: 'Total',
                data: [220, 182, 191, 234, 290, 330, 310]
            },
            {
                name: 'Video Ads',
                type: 'line',
                stack: 'Total',
                data: [150, 232, 201, 154, 190, 330, 410]
            },
            {
                name: 'Direct',
                type: 'line',
                stack: 'Total',
                data: [320, 332, 301, 334, 390, 330, 320]
            },
            {
                name: 'Search Engine',
                type: 'line',
                stack: 'Total',
                data: [820, 932, 901, 934, 1290, 1330, 1320]
            }
        ]
    };
    lineChart.setOption(lineOption);

    // Initialize Pie Chart
    var pieChart = echarts.init(document.getElementById('echart-pie'));
    var pieOption = {
        title: {
            text: 'Referer of a Website',
            subtext: 'Fake Data',
            left: 'center'
        },
        tooltip: {
            trigger: 'item'
        },
        legend: {
            orient: 'vertical',
            left: 'left'
        },
        series: [
            {
                name: 'Access From',
                type: 'pie',
                radius: '50%',
                data: [
                    { value: 1048, name: 'Search Engine' },
                    { value: 735, name: 'Direct' },
                    { value: 580, name: 'Email' },
                    { value: 484, name: 'Union Ads' },
                    { value: 300, name: 'Video Ads' }
                ],
                emphasis: {
                    itemStyle: {
                        shadowBlur: 10,
                        shadowOffsetX: 0,
                        shadowColor: 'rgba(0, 0, 0, 0.5)'
                    }
                }
            }
        ]
    };
    pieChart.setOption(pieOption);

    // Resize charts on window resize
    window.addEventListener('resize', function() {
        lineChart.resize();
        pieChart.resize();
    });
</script>

{% endblock content %}
